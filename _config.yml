# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 时间帧
subtitle: '光学 · 超表面 · 硬核科普'
description: '时间帧——探索光学的奥秘。聚焦超表面（Metasurface）、纳米光子学、计算光学等前沿领域，提供深度硬核科普、学术动态与技术解读。'
keywords: '超表面,metasurface,光学,纳米光子学,计算光学,全息,矢量光场,物理科普,学术科研'
author: Sunfove
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://time-frame.cloud
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 5
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# hexo-tag-common 通用标签插件
tag_common:
  cdn: https://fastly.jsdelivr.net/npm/   # 默认 CDN，照抄即可
  layout:
    - post
    - page
    # - home   # 如果希望首页也启用标签解析，可以把这一行的注释去掉


# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: spectrum

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  - type: git
    repo: git@github.com:sunfove/sunfove.github.io.git
    branch: master
    message: "Update: {{ now('YYYY-MM-DD HH:mm:ss') }}"
  # - type: git
  #   repo: root@47.116.163.133:/var/repo/blog.git
  #   branch: master


# 本地搜索（hexo-generator-search，供 /search 页与主题搜索使用）
search:
  path: local-search.xml
  field: post
  content: true

# Google/Bing 用的标准 Sitemap
sitemap:
  path: sitemap.xml

# 百度专用 Sitemap
baidusitemap:
  path: baidusitemap.xml


# 腾讯云CDN自动刷新配置
tencentcdn:
  secretId: ''      # 这里必须留空，或者是环境变量引用
  secretKey: ''     # 这里必须留空
  type: 1
  timer: 2000