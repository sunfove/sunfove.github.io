name: Hexo Auto Deploy

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: 🔒 强制确保 Fluid 主题
      run: |
        echo "当前主题配置:"
        grep "^theme:" _config.yml
        # 强制写回 fluid，防止任何意外覆盖
        sed -i 's/^theme:.*/theme: fluid/' _config.yml
        echo "已强制设置为:"
        grep "^theme:" _config.yml

    - name: Build Hexo
      run: |
        npx hexo clean
        npx hexo generate
        # 验证 Fluid 主题已生效
        echo "=== 验证主题 ==="
        if grep -q "fluid" public/index.html || ls public/css/main.css 2>/dev/null; then
          echo "✅ Fluid 主题生效"
        else
          echo "❌ 主题不是 Fluid！中止部署"
          exit 1
        fi

    - name: Deploy to Server
      uses: easingthemes/ssh-deploy@main
      env:
        SSH_PRIVATE_KEY: ${{ secrets.HEXO_DEPLOY_PRI }}
        ARGS: "-rlgoDzvc --delete -i"
        SOURCE: "public/"
        REMOTE_HOST: 124.220.80.92
        REMOTE_USER: root
        TARGET: "/var/www/time-frame.cloud"
        EXCLUDE: "/node_modules/"

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        publish_branch: gh-pages

    - name: Refresh CDN (全量清除)
      uses: keithnull/tencent-cloud-cdn-purge-cache@v1.0
      env:
        SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
        SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        PATHS: "https://time-frame.cloud/"
        FLUSH_TYPE: "delete"
