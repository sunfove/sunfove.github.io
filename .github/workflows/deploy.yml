name: Deploy to Production

on:
  push:
    branches:
      - master

# 写入权限
permissions:
  contents: write
  deployments: write
  statuses: write

# 并发控制：同一分支同时只运行一个流程
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  DEPLOY_SERVER: 124.220.80.92
  DEPLOY_PATH: /var/www/time-frame.cloud

jobs:
  # ── 阶段 1：构建与验证 ──
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    outputs:
      build-status: ${{ steps.build.outcome }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Clean previous build
        run: npx hexo clean

      - name: Generate static site
        id: build
        run: npx hexo generate

      - name: Validate build output
        run: |
          echo "=== Build validation ==="
          if [ ! -f "public/index.html" ]; then
            echo "ERROR: public/index.html not found!"
            exit 1
          fi
          echo "✓ index.html exists"
          if [ ! -f "public/local-search.xml" ]; then
            echo "WARNING: local-search.xml not found"
          else
            echo "✓ search index exists"
          fi
          # Count output files
          FILE_COUNT=$(find public -type f | wc -l)
          echo "✓ Total output files: $FILE_COUNT"
          # Check total size
          SIZE=$(du -sh public | cut -f1)
          echo "✓ Build size: $SIZE"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: public/
          retention-days: 1
          compression-level: 6

  # ── 阶段 2：部署到服务器 ──
  deploy-server:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: public/

      - name: Verify artifact
        run: |
          if [ ! -f "public/index.html" ]; then
            echo "ERROR: Artifact missing index.html"
            exit 1
          fi
          echo "✓ Artifact verified"

      - name: Deploy via SSH (rsync)
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HEXO_DEPLOY_PRI }}
          ARGS: "-rlgoDzvc -i --delete --exclude=.well-known"
          SOURCE: "public/"
          REMOTE_HOST: ${{ env.DEPLOY_SERVER }}
          REMOTE_USER: root
          TARGET: ${{ env.DEPLOY_PATH }}
          EXCLUDE: "/node_modules/"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.DEPLOY_SERVER }}
          username: root
          key: ${{ secrets.HEXO_DEPLOY_PRI }}
          script: |
            if [ -f "${{ env.DEPLOY_PATH }}/index.html" ]; then
              echo "✓ Deployment verified: index.html exists on server"
              ls -la ${{ env.DEPLOY_PATH }}/index.html
            else
              echo "ERROR: Deployment verification failed!"
              exit 1
            fi

  # ── 阶段 3：部署到 GitHub Pages ──
  deploy-ghpages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: public/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          commit_message: 'deploy: ${{ github.sha }} [skip ci]'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          full_commit_message: |
            deploy: ${{ github.event.head_commit.message || github.sha }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

  # ── 阶段 4：刷新 CDN ──
  refresh-cdn:
    name: Refresh CDN Cache
    runs-on: ubuntu-latest
    needs: [deploy-server, deploy-ghpages]
    if: always() && (needs.deploy-server.result == 'success' || needs.deploy-ghpages.result == 'success')

    steps:
      - name: Purge Tencent Cloud CDN
        uses: keithnull/tencent-cloud-cdn-purge-cache@v1.0
        env:
          SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          PATHS: 'https://time-frame.cloud/'

  # ── 阶段 5：部署状态通知 ──
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build, deploy-server, deploy-ghpages, refresh-cdn]
    if: always()

    steps:
      - name: Report deployment status
        run: |
          echo "========================================="
          echo "  Deployment Pipeline Summary"
          echo "========================================="
          echo ""
          echo "  Commit:    ${{ github.event.head_commit.message || github.sha }}"
          echo "  Branch:    ${{ github.ref_name }}"
          echo "  Author:    ${{ github.actor }}"
          echo "  Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "  Build:          ${{ needs.build.result || 'skipped' }}"
          echo "  Server Deploy:  ${{ needs.deploy-server.result || 'skipped' }}"
          echo "  GitHub Pages:   ${{ needs.deploy-ghpages.result || 'skipped' }}"
          echo "  CDN Refresh:    ${{ needs.refresh-cdn.result || 'skipped' }}"
          echo ""
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "  ✓ Site: https://time-frame.cloud"
            echo "  ✓ Pages: https://sunfove.github.io"
          fi
          echo "========================================="
